# ShardingSphere-Proxy global config — XuGu storage + MySQL wire frontend
# Copy this file (and config-sharding.yaml) into your Apache SS Proxy 5.5.3 conf/ directory.
# Wire: MySQL client → Proxy:3307; storage: XuGu with compatiblemode=NONE only.

mode:
  type: Standalone
  repository:
    type: Memory

authority:
  users:
    - user: root@%
      password: root
      admin: true
    - user: sharding@%
      password: sharding
  privilege:
    type: ALL_PERMITTED

props:
  max-connections-size-per-query: 1
  kernel-executor-size: 16
  proxy-frontend-flush-threshold: 128
  sql-show: true
  proxy-default-port: 3307
  proxy-frontend-ssl-enabled: false
