# B1: database + table sharding for order / order_item
databaseName: baseline_order_db

mode:
  type: Standalone
  repository:
    type: Memory

dataSources:
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.xugu.cloudjdbc.Driver
    jdbcUrl: ${jdbc.url.ds0}
    username: ${jdbc.user}
    password: ${jdbc.password}
  ds_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.xugu.cloudjdbc.Driver
    jdbcUrl: ${jdbc.url.ds1}
    username: ${jdbc.user}
    password: ${jdbc.password}

rules:
- !SHARDING
  tables:
    baseline_order:
      actualDataNodes: ds_${0..1}.BASELINE_ORDER_${0..1}
      databaseStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: database_inline
      tableStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: order_table_inline
    baseline_order_item:
      actualDataNodes: ds_${0..1}.BASELINE_ORDER_ITEM_${0..1}
      databaseStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: database_inline
      tableStrategy:
        standard:
          shardingColumn: order_id
          shardingAlgorithmName: item_table_inline
  bindingTables:
    - baseline_order,baseline_order_item
  shardingAlgorithms:
    database_inline:
      type: INLINE
      props:
        algorithm-expression: ds_${user_id % 2}
    order_table_inline:
      type: INLINE
      props:
        algorithm-expression: BASELINE_ORDER_${order_id % 2}
    item_table_inline:
      type: INLINE
      props:
        algorithm-expression: BASELINE_ORDER_ITEM_${order_id % 2}

props:
  sql-show: true
