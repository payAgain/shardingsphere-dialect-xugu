# Lab SYSTEM admin URL. BaselineSupport derives per-DATABASE URLs (e.g. baseline_write /
# baseline_read0 / baseline_read1) on the same host for readwrite-splitting IT.
# Optional overrides: jdbc.url.write / jdbc.url.read0 / jdbc.url.read1 (same host only).
# Optional db.ds0 / db.ds1 / db.write / db.read0 / db.read1 to rename DATABASE targets.
# P0-2 asserts routing isolation across those DATABASE names — not physical replicas.
# T3=A: jdbc.user.read is a restricted SELECT-only user on read DATABASE(s) (created by IT via SYSDBA).
# P1-3 same-host alternate namespace: see it-xugu-env2.properties (-Penv2 / -Pit-xugu-env2).
jdbc.url=jdbc:xugu://192.168.2.239:5287/SYSTEM?compatiblemode=NONE&charset=UTF8
jdbc.user=SYSDBA
jdbc.password=SYSDBA
jdbc.user.read=ss_ro_reader
jdbc.password.read=ss_ro_reader
jdbc.driver=com.xugu.cloudjdbc.Driver
